version: '3.8'

services:
  web:
    build: .
    volumes:
      - .:/app
      - ./static/comics:/app/static/comics
      - ./app_data:/app/app_data
    ports:
      - "3000:3000"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3000/')" ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
