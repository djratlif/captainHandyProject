version: '3.8'

services:
  web:
    build: .
    volumes:
      - ./static/comics:/app/static/comics
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3000/')" ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --credentials-file /etc/cloudflared/creds.json run --url http://web:3000 0ec5f94c-8459-4945-b95f-3f596868aca6
    volumes:
      - ~/.cloudflared/0ec5f94c-8459-4945-b95f-3f596868aca6.json:/etc/cloudflared/creds.json:ro
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped
