<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CaptainHandy Comic Studio!</title>
    <!-- Modern typography per aesthetic rules -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div id="app">
        <!-- Intro Screen -->
        <div id="intro-screen" class="screen active">
            <div class="glass-panel">
                <h1 class="gradient-text">CaptainHandy</h1>
                <p class="subtitle">AI Comic Studio!</p>

                <nav style="display: flex; justify-content: center; gap: 1rem; margin-bottom: 2rem;">
                    <a href="/gallery" class="button secondary-btn"
                        style="text-decoration: none; padding: 0.8rem 1.5rem; border-radius: 8px;">📚 Gallery</a>
                    <a href="/logout" class="button secondary-btn"
                        style="text-decoration: none; padding: 0.8rem 1.5rem; border-radius: 8px; color: #ff6b6b; border-color: rgba(255, 107, 107, 0.3);">Logout</a>
                </nav>

                <div class="input-group">
                    <p>What should CaptainHandy do today?</p>
                    <input type="text" id="comic-idea" placeholder="Leave blank for a random adventure!" />
                    <button id="generate-btn">Generate Comic</button>
                </div>
            </div>
        </div>

        <!-- Loading Screen -->
        <div id="loading-screen" class="screen">
            <div class="glass-panel text-center">
                <h2 id="loading-header" class="gradient-text">Brainstorming...</h2>
                <p id="loading-text" class="mb-4">Consulting the AI storywriters.</p>
                <div class="spinner"></div>
                <div id="progress-container" class="mt-6 text-sm text-gray"></div>
            </div>
        </div>

        <!-- Reader Screen -->
        <div id="reader-screen" class="screen flex-col items-center">
            <div class="reader-container">
                <button id="prev-btn" class="nav-btn hidden">&larr;</button>

                <div class="panel-viewer glass-panel">
                    <div class="img-container">
                        <img id="current-panel-img" src="" alt="Comic Panel" />
                    </div>
                    <div class="caption-container">
                        <p id="current-panel-caption"></p>
                    </div>
                </div>

                <button id="next-btn" class="nav-btn">&rarr;</button>
            </div>

            <div class="mt-8">
                <button id="restart-btn" class="secondary-btn">Create Another Comic</button>
            </div>
        </div>
    </div>
    <script src="/static/script.js"></script>
</body>

</html>
